	<h1>希尔科</h1>
	<div class="content">

		<div class="description">
			<p>
				希尔科是《双城之战》中的核心反派，也是祖安地下世界的统治者。他曾与范德尔并肩作战，但因理念不合而决裂。希尔科极具野心，致力于让祖安摆脱皮尔特沃夫的统治，甚至不惜使用微光药剂。他收养了金克丝，并将其视为接班人，两人之间有着复杂而深厚的情感羁绊。
			</p>
		</div>
		<div class="saying" style="text-align: center;font-size: large;">
			<p>“为了我们的理想，没有什么是不能牺牲的。” —— 希尔科</p>
