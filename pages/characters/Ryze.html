	<div class="content">

		<div class="description">
			<p>
				瑞兹是符文之地上最强大的法师之一，他肩负着收集世界符文、防止符文之地毁灭的重任。在《双城之战》中，他曾以神秘法师的身份救下了杰斯和他的母亲，这直接影响了杰斯对魔法的追求。他跨越时空，守护着世界的平衡。
			</p>
